<div class="row">
  <div class="col-md-3" *ngIf="isAdmin$ | async">
    <mat-form-field>
      <mat-label>Предприятие</mat-label>
      <mat-select id="enterprise" name="enterprise"
                  (selectionChange)="selectedEnterpriseSubject.next(+($event.value))">
        <mat-option *ngFor="let e of enterprises$ | async" [value]="e.id">
          {{ e.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
  <div class="col-md-3">
    <mat-form-field>
      <mat-label>Продукт</mat-label>
      <mat-select name="product"
                  [value]="selectedProductSubject | async"
                  (selectionChange)="selectedProductSubject.next(+($event.value))">
        <mat-option *ngFor="let p of products$ | async" [value]="p.id">
          {{ p.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
  <div class="col-md-4">
    <mat-form-field>
      <mat-label>Диапазон дат</mat-label>
      <mat-date-range-input [rangePicker]="picker" (click)="picker.open()">
        <input matStartDate
               id="start-date"
               name="start-date"
               aria-label="Дата от"
               placeholder="Дата от"
               readonly
               [value]="pickerStartDate$ | async"
               (dateInput)="addEvent('inputStartDate', $event)">
        <input matEndDate
               id="end-date"
               name="end-date"
               aria-label="Дата до"
               placeholder="Дата до"
               readonly
               [value]="pickerEndDate$ | async"
               (dateChange)="addEvent('inputEndDate', $event)">
      </mat-date-range-input>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>
  </div>
  <div *ngIf="selectedProductSubject | async" class="col-md-1">
    <button mat-fab aria-label="обновление данных" (click)="updateDb()"
            color="primary" [disabled]="isSyncing">
      <mat-icon *ngIf="!isSyncing" svgIcon="refresh" aria-hidden="false"></mat-icon>
      <mat-spinner *ngIf="isSyncing" diameter="24" color="accent"></mat-spinner>
    </button>
  </div>

  <div *ngIf="isSyncing || progressMessage" class="col-12 mt-2">
    <mat-progress-bar *ngIf="isSyncing" mode="indeterminate"></mat-progress-bar>
    <p class="progress-message mt-1">{{ progressMessage }}</p>
  </div>
</div>
<div *ngIf="selectedProductSubject | async">
  <ng-container *ngFor="let col of allColumns.slice(1); let i = index">
    <div *ngIf="!col.hide"
         [id]="col.def"
         [attr.data-chart-index]="i"
         style="min-height: 160px"
         appChartHost
         (hostReady)="registerChartHost($event)">

      <apx-chart *ngIf="visibleCharts[i]"
                 [series]="chartOptionsArray[i].series"
                 [chart]="chartOptionsArray[i].chart"
                 [colors]="chartOptionsArray[i].colors"
                 [yaxis]="chartOptionsArray[i].yaxis"
                 [title]="chartOptionsArray[i].title"
                 [dataLabels]="commonOptions.dataLabels"
                 [markers]="commonOptions.markers"
                 [stroke]="commonOptions.stroke"
                 [grid]="commonOptions.grid"
                 [xaxis]="commonOptions.xaxis"
                 [tooltip]="commonOptions.tooltip">
      </apx-chart>

      <div *ngIf="!visibleCharts[i]"
           style=" height:160px; display:flex; align-items:center;
           justify-content:center; background:#f9f9f9; color:#aaa">
      </div>
    </div>
  </ng-container>
</div>
<div *ngIf="selectedProductSubject.value != null && ((measures$ | async)?.length ?? 0) > 0" class="mat-elevation-z8 flex-element">
  <table mat-table [dataSource]="(tableMeasures$ | async) ?? []" class="mat-elevation-z8">

    <ng-container matColumnDef="time">
      <th mat-header-cell *matHeaderCellDef>{{ allColumns[0].label }}</th>
      <td mat-cell *matCellDef="let row">
        {{ row.time | date:'dd/MM/yyyy HH:mm' }}
      </td>
    </ng-container>

    <ng-container *ngFor="let col of allColumns.slice(1)" [matColumnDef]="col.def">
      <th mat-header-cell *matHeaderCellDef>{{ col.label }}</th>
      <td mat-cell *matCellDef="let row">
        {{ row[col.label] }}
      </td>
    </ng-container>

    <ng-container matColumnDef="item-description">
      <th mat-header-cell *matHeaderCellDef colspan="10" class="text-center">
        Продукт "{{ selectedProductName }}"
      </th>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['item-description']" class="first-header-row"></tr>
    <tr mat-header-row *matHeaderRowDef="displayedColumns" class="second-header-row"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  </table>
  <mat-paginator [length]="total"
                 [pageSize]="40"
                 [hidePageSize]="true"
                 (page)="page$.next($event)">
  </mat-paginator>
</div>
<div *ngIf="selectedProductSubject.value != null && ((measures$ | async)?.length ?? 0) > 0" class="fab-wrapper">
  <button mat-fab color="primary" (click)="downloadCsv()">
    <mat-icon svgIcon="csv" aria-hidden="false" aria-label="Скачать csv"></mat-icon>
  </button>
</div>
